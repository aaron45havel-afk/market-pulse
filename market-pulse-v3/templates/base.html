<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Market Pulse{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #242736;
            --border: #2d3044;
            --text: #e4e4e7;
            --text-dim: #9ca3af;
            --accent: #22c55e;
            --accent2: #3b82f6;
            --red: #ef4444;
            --yellow: #eab308;
            --orange: #f97316;
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        a { color: var(--accent2); text-decoration: none; }
        a:hover { text-decoration: underline; }

        nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; height: 56px; }
        nav .logo { font-size: 1.25rem; font-weight: 700; color: var(--accent); margin-right: 2rem; }
        nav .links { display: flex; gap: 1.5rem; }
        nav .links a { color: var(--text-dim); font-size: 0.9rem; font-weight: 500; }
        nav .links a:hover, nav .links a.active { color: var(--text); text-decoration: none; }

        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem; }
        h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.25rem; }
        h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; color: var(--text); }
        .subtitle { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 1.5rem; }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
        .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 1rem; }

        .metric-card { text-align: center; padding: 1rem; }
        .metric-card .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); margin-bottom: 0.25rem; }
        .metric-card .value { font-size: 1.5rem; font-weight: 700; }
        .metric-card .change { font-size: 0.8rem; margin-top: 0.25rem; }
        .up { color: var(--accent); }
        .down { color: var(--red); }
        .neutral { color: var(--yellow); }

        .signal-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .signal-buy { background: rgba(34,197,94,0.15); color: var(--accent); border: 1px solid rgba(34,197,94,0.3); }
        .signal-wait { background: rgba(234,179,8,0.15); color: var(--yellow); border: 1px solid rgba(234,179,8,0.3); }
        .signal-neutral { background: rgba(59,130,246,0.15); color: var(--accent2); border: 1px solid rgba(59,130,246,0.3); }
        .signal-expensive { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }

        .state-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .state-tab { padding: 0.5rem 1.25rem; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); cursor: pointer; font-size: 0.9rem; color: var(--text-dim); font-weight: 500; transition: all 0.2s; }
        .state-tab:hover { border-color: var(--accent2); color: var(--text); }
        .state-tab.active { background: var(--accent2); color: white; border-color: var(--accent2); }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        thead th { text-align: left; padding: 0.75rem 1rem; color: var(--text-dim); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
        thead th:hover { color: var(--text); }
        thead th.sorted-asc::after { content: " ▲"; }
        thead th.sorted-desc::after { content: " ▼"; }
        tbody td { padding: 0.6rem 1rem; border-bottom: 1px solid var(--border); white-space: nowrap; }
        tbody tr:hover { background: var(--surface2); }

        .search-bar { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 1rem; color: var(--text); font-size: 0.9rem; width: 250px; outline: none; }
        .search-bar:focus { border-color: var(--accent2); }
        .filter-row { display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
        select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 0.75rem; color: var(--text); font-size: 0.85rem; outline: none; }

        .loading { text-align: center; padding: 3rem; color: var(--text-dim); }
        .loading .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent2); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .chart-container { position: relative; height: 300px; }
        .signals-list { list-style: none; }
        .signals-list li { padding: 0.5rem 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .signals-list li:last-child { border: none; }

        .footer { text-align: center; padding: 2rem; color: var(--text-dim); font-size: 0.75rem; border-top: 1px solid var(--border); margin-top: 2rem; }

        @media (max-width: 768px) {
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
            nav { padding: 0 1rem; }
            .container { padding: 1rem; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav>
        <div class="logo">Market Pulse</div>
        <div class="links">
            <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Home</a>
            <a href="/real-estate" class="{% if '/real-estate' in request.url.path %}active{% endif %}">Real Estate</a>
            <a href="/finance" class="{% if '/finance' in request.url.path %}active{% endif %}">Finance Screener</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <div class="footer">
        Market Pulse &mdash; Data from FRED (Federal Reserve) &amp; Yahoo Finance. Updated periodically. Not financial advice.
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
