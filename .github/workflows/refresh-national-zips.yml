name: Refresh national ZIPs database

# Builds market-pulse-v21/data/zips.db from Zillow ZHVI/ZORI per-ZIP
# CSVs + Census ZCTA Gazetteer + Census ACS 2022 5-year. Runs every
# Monday, 2 hours after refresh-zillow.yml so its input is always the
# freshest available data. Commits are skipped when zips.db is unchanged.
#
# Same auto-commit + push-to-main pattern as refresh-zillow / refresh-
# redfin / refresh-rates.

on:
  schedule:
    - cron: '0 14 * * 1'   # Mondays 14:00 UTC (2hr after Zillow at 12:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: market-pulse-v21
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build national ZIPs database
        run: python scripts/build_national_zips.py

      - name: Commit + push if changed
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage first, THEN check the staged diff. `git diff` alone
          # ignores untracked files, so on the first run (when zips.db
          # doesn't exist in main yet) the previous check skipped the
          # commit. `git diff --staged` covers both new + modified.
          git add market-pulse-v21/data/zips.db
          if git diff --staged --quiet -- market-pulse-v21/data/zips.db; then
            echo "No change to zips.db — nothing to commit."
            exit 0
          fi
          git commit -m "chore: refresh national ZIPs database

          Auto-generated by .github/workflows/refresh-national-zips.yml.
          Sources: Zillow ZHVI/ZORI per ZIP, Census 2020 ZCTA Gazetteer,
          ACS 2022 5-year API."
          git push origin HEAD:main
