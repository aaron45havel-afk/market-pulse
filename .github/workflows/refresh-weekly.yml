name: Weekly site data refresh

# Refreshes all core market data every Monday morning UTC so the site always
# shows the freshest available numbers. Each script checks its upstream source
# for changes; if nothing has changed since last run the JSON file is not
# modified and nothing is committed.
#
# Individual source publishing cadences vary (Zillow/Redfin monthly, FRED
# weekly, BLS monthly), so most weeks only rates.json changes. On or just
# after the 1st of each month all five files typically update together.

on:
  schedule:
    - cron: '0 9 * * 1'   # Mondays 09:00 UTC
  workflow_dispatch:        # also run manually from the Actions tab

permissions:
  contents: write           # needed to commit JSON files back to main

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: market-pulse-v21
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Refresh mortgage rate (FRED MORTGAGE30US)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/refresh_rates.py

      - name: Refresh Zillow home values & rents
        run: python scripts/refresh_zillow.py

      - name: Refresh Redfin market metrics
        run: python scripts/refresh_redfin.py

      - name: Refresh state unemployment (BLS via FRED)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/refresh_bls.py

      - name: Refresh building permits & job growth (FRED)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/refresh_growth.py

      - name: Commit + push if anything changed
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          DATA_FILES=(
            market-pulse-v21/data/rates.json
            market-pulse-v21/data/zillow_overrides.json
            market-pulse-v21/data/redfin_overrides.json
            market-pulse-v21/data/bls_overrides.json
            market-pulse-v21/data/growth_overrides.json
          )
          git add "${DATA_FILES[@]}"
          if git diff --staged --quiet; then
            echo "All data files unchanged — nothing to commit."
            exit 0
          fi
          git commit -m "chore: weekly site data refresh

          Auto-generated by .github/workflows/refresh-weekly.yml.
          Sources: FRED (rates, BLS, growth), Zillow Research, Redfin Data Center."
          # Retry push with rebase to handle racing commits from other workflows.
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              break
            fi
            echo "Push attempt $attempt failed — pulling rebase and retrying."
            sleep $((attempt * 5))
            git pull --rebase origin main || true
          done
          git push origin HEAD:main
