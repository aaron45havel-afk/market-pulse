name: Weekly data refresh

# Checks every data source that can change between monthly releases —
# mortgage rates, Zillow home values/rents, Redfin market stats, FRED
# permits + employment, and BLS state unemployment. Each script only
# writes (and commits) when the fetched data differs from what is
# already cached, so weeks with no upstream changes produce no commits.
#
# Cadence: Mondays 09:00 UTC. This catches anything published since the
# previous Friday rates refresh (Freddie Mac PMMS) or over the weekend.
# The existing dedicated monthly workflows (1st / 15th) remain in place
# and continue to run as before.

on:
  schedule:
    - cron: '0 9 * * 1'   # Mondays 09:00 UTC
  workflow_dispatch:       # also run manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: market-pulse-v21
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Mortgage rates (FRED MORTGAGE30US, weekly Freddie Mac PMMS) ──
      - name: Refresh mortgage rates
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/refresh_rates.py
        continue-on-error: true

      # ── Zillow ZHVI / ZORI (ZIP + state home values and rents) ───────
      - name: Refresh Zillow data
        run: python scripts/refresh_zillow.py
        continue-on-error: true

      # ── Redfin state market tracker (sales, DOM, price drops) ────────
      - name: Refresh Redfin data
        run: python scripts/refresh_redfin.py
        continue-on-error: true

      # ── FRED: state building permits + nonfarm employment ────────────
      - name: Refresh growth outlook data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/refresh_growth.py
        continue-on-error: true

      # ── FRED: state unemployment rates (BLS {STATE}UR series) ────────
      - name: Refresh BLS unemployment data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/refresh_bls.py
        continue-on-error: true

      # ── Commit any files that changed ─────────────────────────────────
      - name: Commit + push changed data files
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            market-pulse-v21/data/rates.json \
            market-pulse-v21/data/zillow_overrides.json \
            market-pulse-v21/data/redfin_overrides.json \
            market-pulse-v21/data/growth_overrides.json \
            market-pulse-v21/data/bls_overrides.json
          if git diff --staged --quiet; then
            echo "No data changes this week — nothing to commit."
            exit 0
          fi
          git commit -m "chore: weekly data refresh $(date -u +%Y-%m-%d)

          Auto-generated by .github/workflows/weekly-refresh.yml."
          git push origin HEAD:main
