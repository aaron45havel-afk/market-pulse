name: Enrich ZIP neighborhoods (Photon / OSM)

# Reverse-geocodes each ZIP centroid to a neighborhood / locality
# name and persists the cache in data/zip_neighborhoods.json. On the
# first runs the cache fills toward 30K entries; once full, weekly
# runs are near-instant (only new ZIPs get enriched).
#
# Cadence: weekly Sundays. Each run caps at 5 hours so it fits inside
# GitHub Actions' 6-hour job limit; partial runs persist after every
# 100 ZIPs so a cap-out resumes cleanly the next week.
#
# Workflow_dispatch lets the user kick a fresh run any time (e.g. to
# re-enrich a swath of new ZIPs after a Zillow refresh).

on:
  schedule:
    - cron: '0 7 * * 0'   # Sundays 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 350    # ~5h50m, just under GitHub's 6h hard cap
    defaults:
      run:
        working-directory: market-pulse-v21
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run neighborhood enrichment
        # Cap the script to 5 hours so the action's runner has time to
        # cleanly write the JSON cache + commit before the 6h hard cap.
        run: python scripts/enrich_neighborhoods.py --max-runtime 18000

      - name: Commit + push if changed
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add market-pulse-v21/data/zip_neighborhoods.json
          if git diff --staged --quiet -- market-pulse-v21/data/zip_neighborhoods.json; then
            echo "No new neighborhoods enriched — nothing to commit."
            exit 0
          fi
          git commit -m "chore: enrich ZIP neighborhoods (Photon)

          Auto-generated by .github/workflows/refresh-neighborhoods.yml.
          Source: Photon (komoot.io OSM reverse-geocoder)."
          git push origin HEAD:main
