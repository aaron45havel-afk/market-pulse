name: Refresh state unemployment (BLS via FRED)

# Pulls each state's unemployment rate from FRED ({STATE}UR series),
# writes to data/bls_overrides.json. data_providers patches
# CHOROPLETH_STATES on import so the new unemployment_pct metric
# shows up in /map's sidebar without code changes.
#
# Cadence: 15th of each month (BLS publishes state UR ~3 weeks after
# month-end — April data lands around mid-May).
#
# Same auto-commit pattern as refresh-rates / refresh-zillow / etc.

on:
  schedule:
    - cron: '15 13 * * 1'   # 13:15 UTC every Monday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: market-pulse-v21
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run BLS refresh
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/refresh_bls.py

      - name: Commit + push if changed
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add market-pulse-v21/data/bls_overrides.json
          if git diff --staged --quiet -- market-pulse-v21/data/bls_overrides.json; then
            echo "No change to bls_overrides.json — nothing to commit."
            exit 0
          fi
          git commit -m "chore: refresh state unemployment from FRED

          Auto-generated by .github/workflows/refresh-bls.yml.
          Source: FRED state unemployment series ({STATE}UR), BLS."
          # Push with rebase-on-conflict so racing commits (other monthly
          # jobs landing during our long run) don't blow up the auto-commit.
          # Retry up to 4 times with a brief sleep before each rebase.
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              break
            fi
            echo "Push attempt $attempt failed — pulling rebase and retrying."
            sleep $((attempt * 5))
            git pull --rebase origin main || true
          done
          # Final attempt — if it still fails the workflow exits non-zero.
          git push origin HEAD:main
