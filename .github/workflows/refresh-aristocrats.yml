name: Refresh Dividend Aristocrats (monthly)

# Pulls prices, TTM yields, each stock's own 5-yr median trailing
# yield, dividend CAGRs, and 52-week ranges for the /aristocrats
# universe from Yahoo Finance's chart API. Overlay lands at
# market-pulse-v21/data/aristocrats.json — aristocrats.py reads it at
# request time when present, falling back to the hand-seeded snapshot
# when missing/malformed.
#
# Cadence: 10th of each month at 13:30 UTC — dividend declarations
# cluster early-month, and this stays clear of the other monthly jobs.
# Run it manually (workflow_dispatch) once after merging to populate
# the page the first time.

on:
  schedule:
    - cron: '30 13 10 * *'   # 13:30 UTC on the 10th
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: market-pulse-v21
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run aristocrats refresh
        run: python scripts/refresh_aristocrats.py

      - name: Commit + push if changed
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add market-pulse-v21/data/aristocrats.json
          if git diff --staged --quiet -- market-pulse-v21/data/aristocrats.json; then
            echo "No change to aristocrats.json — nothing to commit."
            exit 0
          fi
          git commit -m "chore: refresh aristocrats valuation overlay

          Auto-generated by .github/workflows/refresh-aristocrats.yml.
          Source: Yahoo Finance chart API — TTM yield, 5-yr median
          trailing yield, dividend CAGR, 52-week range."
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              break
            fi
            echo "Push attempt $attempt failed — pulling rebase and retrying."
            sleep $((attempt * 5))
            git pull --rebase origin main || true
          done
          git push origin HEAD:main
