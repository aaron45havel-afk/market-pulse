name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  household-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # Pure-stdlib engine tests — no pip install needed.
      - name: Household engine tests
        run: python market-pulse-v21/tests/test_household.py
