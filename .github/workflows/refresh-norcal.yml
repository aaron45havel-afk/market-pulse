name: Refresh NorCal condo data (monthly)

# Pulls Zillow's public condo-tier ZHVI CSV, filters to the /norcal Bay
# universe, and writes data/norcal_condo.json — condo entry prices +
# 15-year steadiness stats. norcal.py prefers this overlay per-ZIP;
# without it the page falls back to all-homes medians (60-mo window).
#
# Cadence: 8th of each month at 14:00 UTC.

on:
  schedule:
    - cron: '0 14 8 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: market-pulse-v21
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run NorCal condo refresh
        run: python scripts/refresh_norcal.py

      - name: Commit + push if changed
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add market-pulse-v21/data/norcal_condo.json
          if git diff --staged --quiet -- market-pulse-v21/data/norcal_condo.json; then
            echo "No change to norcal_condo.json — nothing to commit."
            exit 0
          fi
          git commit -m "chore: refresh NorCal condo overlay

          Auto-generated by .github/workflows/refresh-norcal.yml.
          Source: Zillow condo-tier ZHVI (ZIP, monthly)."
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              break
            fi
            echo "Push attempt $attempt failed — pulling rebase and retrying."
            sleep $((attempt * 5))
            git pull --rebase origin main || true
          done
          git push origin HEAD:main
