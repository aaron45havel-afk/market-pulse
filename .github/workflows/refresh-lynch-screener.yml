name: Refresh Lynch GARP screener snapshot

# Monthly snapshot of the Peter Lynch GARP screener (large-cap value
# growth: P/E<10, EPS growth>10%, mkt cap>$1B, D/E<0.5, CapEx/OCF<0.5).
# Commits to data/lynch_snapshots/YYYY-MM.json; the /lynch UI loads the
# latest and lets you browse history via a month dropdown.
#
# Runs an hour after the net-net screener so the SEC API isn't taking
# two hits at once.

on:
  schedule:
    - cron: '0 11 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: market-pulse-v21
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime deps
        run: pip install -r requirements.txt

      - name: Snapshot the Lynch screener
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/refresh_lynch_screener.py

      - name: Commit + push if changed
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add market-pulse-v21/data/lynch_snapshots
          if git diff --staged --quiet -- market-pulse-v21/data/lynch_snapshots; then
            echo "No change to lynch_snapshots — nothing to commit."
            exit 0
          fi
          git commit -m "chore: monthly Lynch GARP screener snapshot

          Auto-generated by .github/workflows/refresh-lynch-screener.yml.
          Source: SEC EDGAR XBRL + Stooq daily close."
          git push origin HEAD:main
