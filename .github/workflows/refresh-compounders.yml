name: Refresh Compounders screen (monthly)

# Rebuilds data/compounders.json for /compounders — the 14%/yr screen.
# Universe self-discovers from SEC EDGAR frames (every filer ≥ $1B
# revenue, ~2000 names incl. US-listed ADRs), then 10 years of XBRL
# fundamentals per company + Yahoo prices/dividends. Full run takes
# ~45-70 minutes at SEC-polite request rates — well inside the 6h limit.
#
# Cadence: 5th of each month at 09:00 UTC (after most 10-K/Q waves
# settle, before the other monthly jobs' window).

on:
  schedule:
    - cron: '0 9 5 * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Process only the N largest companies (testing)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    defaults:
      run:
        working-directory: market-pulse-v21
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run compounders refresh
        run: |
          if [ -n "${{ inputs.limit }}" ]; then
            python scripts/refresh_compounders.py --limit "${{ inputs.limit }}"
          else
            python scripts/refresh_compounders.py
          fi

      - name: Commit + push if changed
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add market-pulse-v21/data/compounders.json
          if git diff --staged --quiet -- market-pulse-v21/data/compounders.json; then
            echo "No change to compounders.json — nothing to commit."
            exit 0
          fi
          git commit -m "chore: refresh compounders screen data

          Auto-generated by .github/workflows/refresh-compounders.yml.
          SEC EDGAR XBRL (10y fundamentals) + Yahoo (prices/dividends)."
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              break
            fi
            echo "Push attempt $attempt failed — pulling rebase and retrying."
            sleep $((attempt * 5))
            git pull --rebase origin main || true
          done
          git push origin HEAD:main
