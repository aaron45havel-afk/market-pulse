name: Refresh Growth Outlook data

# Pulls fresh state-level Building Permits + Total Nonfarm Employment
# from FRED, computes permits-per-1K and YoY job growth, and commits
# data/growth_overrides.json. data_providers patches the choropleth +
# recomputes the growth_score composite at module import. Same pattern
# as Zillow + Redfin refreshes — runs on the 1st of every month plus
# on demand.

on:
  schedule:
    - cron: '30 12 1 * *'   # 12:30 UTC on the 1st (after Zillow + Redfin)
  workflow_dispatch:         # also run manually from the Actions tab

permissions:
  contents: write            # needed to commit the JSON back to main

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: market-pulse-v21
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run growth refresh
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/refresh_growth.py

      - name: Commit + push if anything changed
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add market-pulse-v21/data/growth_overrides.json
          if git diff --staged --quiet -- market-pulse-v21/data/growth_overrides.json; then
            echo "No changes to growth overrides — nothing to commit."
            exit 0
          fi
          git commit -m "chore: refresh state Building Permits + Job Growth from FRED

          Auto-generated by .github/workflows/refresh-growth.yml.
          Source: FRED state Building Permits + Total Nonfarm Employment series."
          # Push with rebase-on-conflict so racing commits (other monthly
          # jobs landing during our long run) don't blow up the auto-commit.
          # Retry up to 4 times with a brief sleep before each rebase.
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              break
            fi
            echo "Push attempt $attempt failed — pulling rebase and retrying."
            sleep $((attempt * 5))
            git pull --rebase origin main || true
          done
          # Final attempt — if it still fails the workflow exits non-zero.
          git push origin HEAD:main
