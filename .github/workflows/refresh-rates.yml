name: Refresh mortgage rate

# Pulls the latest 30-yr fixed mortgage rate from FRED MORTGAGE30US
# (Freddie Mac PMMS, weekly avg). Drives the rate chip on /map, the
# /affordability default, and the cash_on_cash composite. Same auto-
# commit pattern as refresh-zillow / refresh-redfin / refresh-growth.
#
# Cadence: weekly Friday morning UTC. Freddie Mac publishes Thursday
# afternoon ET, so by Friday morning UTC the new value is available.

on:
  schedule:
    - cron: '45 12 * * 5'   # Fridays 12:45 UTC
  workflow_dispatch:         # also run manually from the Actions tab

permissions:
  contents: write            # needed to commit the JSON back to main

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: market-pulse-v21
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run mortgage rate refresh
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/refresh_rates.py

      - name: Commit + push if anything changed
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- market-pulse-v21/data/rates.json; then
            echo "No change to mortgage rate — nothing to commit."
            exit 0
          fi
          git add market-pulse-v21/data/rates.json
          git commit -m "chore: refresh 30-yr fixed mortgage rate from FRED

          Auto-generated by .github/workflows/refresh-rates.yml.
          Source: FRED MORTGAGE30US (Freddie Mac PMMS, weekly avg)."
          git push origin HEAD:main
