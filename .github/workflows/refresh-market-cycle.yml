name: Refresh Market Cycle Proxy (monthly)

# Builds an equity-market business-cycle proxy for the 11 countries OECD
# dropped from its CLI (CH, NL, SE, PL, CL, HK, SG, TW, TH, MY, PH), from
# Yahoo Finance index data. Overlay lands at
# market-pulse-v21/data/market_cycle.json — country_data.py merges it with
# the OECD CLI overlay at request time and badges it "market proxy".
#
# Kept in a SEPARATE file from oecd_cli.json so this job and the OECD job
# never race on one JSON.
#
# Cadence: 12th of each month at 13:30 UTC — two days after the OECD run
# (10th) so both overlays refresh in the same window.

on:
  schedule:
    - cron: '30 13 12 * *'   # 13:30 UTC on the 12th
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: market-pulse-v21
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run market cycle refresh
        run: python scripts/refresh_market_cycle.py

      - name: Commit + push if changed
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add market-pulse-v21/data/market_cycle.json
          if git diff --staged --quiet -- market-pulse-v21/data/market_cycle.json; then
            echo "No change to market_cycle.json — nothing to commit."
            exit 0
          fi
          git commit -m "chore: refresh market cycle proxy overlay

          Auto-generated by .github/workflows/refresh-market-cycle.yml.
          Equity-index cycle proxy for the 11 countries OECD CLI drops."
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              break
            fi
            echo "Push attempt $attempt failed — pulling rebase and retrying."
            sleep $((attempt * 5))
            git pull --rebase origin main || true
          done
          git push origin HEAD:main
