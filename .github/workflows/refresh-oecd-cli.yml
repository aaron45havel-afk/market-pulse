name: Refresh OECD CLI (monthly)

# Pulls the amplitude-adjusted Composite Leading Indicator for every
# country used by /global-values. Overlay lands at
# market-pulse-v21/data/oecd_cli.json — country_data.py reads it at
# request time when present, falling back to the hard-coded snapshot
# in COUNTRIES if the file is missing or malformed.
#
# Cadence: 15th of each month at 13:00 UTC.
# OECD typically publishes CLI around the 10th of each month, so
# waiting five days gives the release time to stabilize and avoids
# hitting their API during the daily reload window.
#
# Same auto-commit + rebase-on-conflict pattern as the other monthly
# refresh workflows (refresh-bls.yml etc.).

on:
  schedule:
    - cron: '0 13 15 * *'   # 13:00 UTC on the 15th
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: market-pulse-v21
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run OECD CLI refresh
        run: python scripts/refresh_oecd_cli.py

      - name: Commit + push if changed
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add market-pulse-v21/data/oecd_cli.json
          if git diff --staged --quiet -- market-pulse-v21/data/oecd_cli.json; then
            echo "No change to oecd_cli.json — nothing to commit."
            exit 0
          fi
          git commit -m "chore: refresh OECD CLI overlay

          Auto-generated by .github/workflows/refresh-oecd-cli.yml.
          Source: OECD Data Explorer SDMX API — amplitude-adjusted CLI
          (LOLITOAA), monthly frequency."
          # Push with rebase-on-conflict so racing commits from other
          # monthly jobs don't blow up the auto-commit. Retry up to 4
          # times with a brief sleep before each rebase.
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              break
            fi
            echo "Push attempt $attempt failed — pulling rebase and retrying."
            sleep $((attempt * 5))
            git pull --rebase origin main || true
          done
          # Final attempt — if it still fails the workflow exits non-zero.
          git push origin HEAD:main
