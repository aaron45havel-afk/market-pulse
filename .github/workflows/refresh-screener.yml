name: Refresh net-net screener snapshot

# Monthly snapshot of the net-net screener.
#
# Runs the SEC EDGAR screener on the 1st of each month and commits
# the pass-list to data/screener_snapshots/YYYY-MM.json. The /finance
# UI defaults to the latest snapshot via /api/finance/snapshots; a
# dropdown lets you browse the last 24 months.
#
# Cadence: 1st of each month, 10:00 UTC — well after any month-end
# SEC filings have been ingested and outside the start-of-day burst
# of cron jobs that hit the FRED/BLS APIs we already use.
#
# Same auto-commit pattern as refresh-bls / refresh-zillow / etc.

on:
  schedule:
    - cron: '0 10 * * 1'   # 10:00 UTC every Monday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: market-pulse-v21
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime deps
        run: pip install -r requirements.txt

      - name: Snapshot the screener
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/refresh_screener.py

      - name: Commit + push if changed
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add market-pulse-v21/data/screener_snapshots
          if git diff --staged --quiet -- market-pulse-v21/data/screener_snapshots; then
            echo "No change to screener_snapshots — nothing to commit."
            exit 0
          fi
          git commit -m "chore: monthly net-net screener snapshot

          Auto-generated by .github/workflows/refresh-screener.yml.
          Source: SEC EDGAR XBRL company facts."
          # Push with rebase-on-conflict so racing commits (other monthly
          # jobs landing during our long run) don't blow up the auto-commit.
          # Retry up to 4 times with a brief sleep before each rebase.
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              break
            fi
            echo "Push attempt $attempt failed — pulling rebase and retrying."
            sleep $((attempt * 5))
            git pull --rebase origin main || true
          done
          # Final attempt — if it still fails the workflow exits non-zero.
          git push origin HEAD:main
