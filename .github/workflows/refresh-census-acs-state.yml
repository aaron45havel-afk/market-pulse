name: Refresh state ACS demographics (Census 5-year)

# Pulls state-level median income / pct bachelors+ / median age from
# the Census ACS 5-year API and writes data/census_acs_state_overrides.json.
# data_providers patches CHOROPLETH_STATES on import so the
# refreshed values + the new pct_bachelors_state metric appear on
# /map without code changes.
#
# Cadence: annual. ACS 5-year vintages release each December (2023
# data → Dec 2024). Cron is January 10th — gives Census time to
# stabilize after release.
#
# Census now requires CENSUS_API_KEY for ACS bulk queries
# (https://api.census.gov/data/key_signup.html — free).

on:
  schedule:
    - cron: '0 13 10 1 *'   # 13:00 UTC on Jan 10
  workflow_dispatch:
    inputs:
      vintage:
        description: 'ACS 5-year vintage year'
        required: false
        default: '2022'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: market-pulse-v21
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Census ACS state refresh
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          # Use the workflow_dispatch input if provided, else default
          # to the year set in the script (which is bumped manually).
          if [ -n "${{ inputs.vintage }}" ]; then
            python scripts/refresh_census_acs_state.py --vintage ${{ inputs.vintage }}
          else
            python scripts/refresh_census_acs_state.py
          fi

      - name: Commit + push if changed
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add market-pulse-v21/data/census_acs_state_overrides.json
          if git diff --staged --quiet -- market-pulse-v21/data/census_acs_state_overrides.json; then
            echo "No change to census_acs_state_overrides.json — nothing to commit."
            exit 0
          fi
          git commit -m "chore: refresh state ACS demographics from Census

          Auto-generated by .github/workflows/refresh-census-acs-state.yml.
          Source: Census ACS 5-year API (state-level)."
          git push origin HEAD:main
