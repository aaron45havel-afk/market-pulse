name: Refresh Zillow data

# Pulls fresh Zillow ZHVI (home values) and ZORI (rents) for every ZIP in the
# neighborhood maps, writes data/zillow_overrides.json, and opens a PR with
# the diff. Cap-rate scoring picks up the new numbers automatically once
# merged. Runs on the 1st of every month plus on demand.

on:
  schedule:
    - cron: '0 12 1 * *'   # 12:00 UTC on the 1st of each month
  workflow_dispatch:        # also run manually from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: market-pulse-v21
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Zillow refresh
        run: python scripts/refresh_zillow.py

      - name: Open / update PR with the diff
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: refresh Zillow ZHVI/ZORI overrides'
          branch: chore/refresh-zillow
          delete-branch: true
          title: 'chore: refresh Zillow ZHVI/ZORI overrides'
          body: |
            Auto-generated by `.github/workflows/refresh-zillow.yml`.

            Pulls the latest Zillow Research ZHVI (home value) and ZORI (rent)
            CSVs and writes the latest monthly value per ZIP into
            `market-pulse-v21/data/zillow_overrides.json`. The neighborhood
            modules apply this file at import time.

            Review the diff, merge if it looks reasonable. Reverting is just
            deleting the file.
          add-paths: market-pulse-v21/data/zillow_overrides.json
