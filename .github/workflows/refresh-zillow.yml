name: Refresh Zillow data

# Pulls fresh Zillow ZHVI (home values) and ZORI (rents) for every ZIP in the
# neighborhood maps, writes data/zillow_overrides.json, and commits the result
# directly to main. Cap-rate scoring picks up the new numbers on the next
# deploy. Runs on the 1st of every month plus on demand.

on:
  schedule:
    - cron: '0 12 1 * *'   # 12:00 UTC on the 1st of each month
  workflow_dispatch:        # also run manually from the Actions tab

permissions:
  contents: write           # needed to commit the JSON back to main

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: market-pulse-v21
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Zillow refresh
        run: python scripts/refresh_zillow.py

      - name: Commit + push if anything changed
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- market-pulse-v21/data/zillow_overrides.json; then
            echo "No changes to Zillow overrides — nothing to commit."
            exit 0
          fi
          git add market-pulse-v21/data/zillow_overrides.json
          git commit -m "chore: refresh Zillow ZHVI/ZORI overrides

          Auto-generated by .github/workflows/refresh-zillow.yml.
          Source: Zillow Research public CSVs."
          git push origin HEAD:main
