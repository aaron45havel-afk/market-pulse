name: Refresh Redfin data

# Pulls fresh Redfin state-level Home Sales + Days on Market for the
# /map state choropleth, writes data/redfin_overrides.json, and commits
# the result directly to main. Same pattern as refresh-zillow.yml — runs
# every Monday plus on demand.

on:
  schedule:
    - cron: '15 12 * * 1'   # Mondays 12:15 UTC (15min after Zillow to avoid collision)
  workflow_dispatch:         # also run manually from the Actions tab

permissions:
  contents: write            # needed to commit the JSON back to main

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: market-pulse-v21
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Redfin refresh
        run: python scripts/refresh_redfin.py

      - name: Commit + push if anything changed
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- market-pulse-v21/data/redfin_overrides.json; then
            echo "No changes to Redfin overrides — nothing to commit."
            exit 0
          fi
          git add market-pulse-v21/data/redfin_overrides.json
          git commit -m "chore: refresh Redfin Home Sales + Days on Market

          Auto-generated by .github/workflows/refresh-redfin.yml.
          Source: Redfin Data Center state_market_tracker (All Residential)."
          git push origin HEAD:main
