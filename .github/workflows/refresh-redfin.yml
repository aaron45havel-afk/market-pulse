name: Refresh Redfin data

# Pulls fresh Redfin state-level Home Sales + Days on Market for the
# /map state choropleth, writes data/redfin_overrides.json, and commits
# the result directly to main. Same pattern as refresh-zillow.yml — runs
# on the 1st of every month plus on demand. The 1st-of-month cadence
# matches Redfin's data center publishing schedule (they release the
# previous month's complete data by the 14th, so by the 1st of the
# following month their data is the freshest possible monthly cut).

on:
  schedule:
    - cron: '15 12 1 * *'   # 12:15 UTC on the 1st (15min after Zillow to avoid collision)
  workflow_dispatch:         # also run manually from the Actions tab

permissions:
  contents: write            # needed to commit the JSON back to main

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: market-pulse-v21
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Redfin refresh
        run: python scripts/refresh_redfin.py

      - name: Commit + push if anything changed
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage first, THEN check the staged diff. `git diff` alone
          # ignores untracked files, so if this file were ever new/
          # untracked this check would wrongly report "no change".
          git add market-pulse-v21/data/redfin_overrides.json
          if git diff --staged --quiet -- market-pulse-v21/data/redfin_overrides.json; then
            echo "No changes to Redfin overrides — nothing to commit."
            exit 0
          fi
          git commit -m "chore: refresh Redfin Home Sales + Days on Market

          Auto-generated by .github/workflows/refresh-redfin.yml.
          Source: Redfin Data Center state_market_tracker (All Residential)."
          # Push with rebase-on-conflict so racing commits (other monthly
          # jobs landing during our long run) don't blow up the auto-commit.
          # Retry up to 4 times with a brief sleep before each rebase.
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              break
            fi
            echo "Push attempt $attempt failed — pulling rebase and retrying."
            sleep $((attempt * 5))
            git pull --rebase origin main || true
          done
          # Final attempt — if it still fails the workflow exits non-zero.
          git push origin HEAD:main
